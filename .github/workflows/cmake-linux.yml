name: Linux CMake

on:
  workflow_dispatch:
  push:
    branches: main
    tags-ignore: '*.*'
    paths:
      - '.github/workflows/cmake-linux.yml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'include/**'
      - 'src/*pp'
      - 'src/linux/*pp'
  pull_request:
    branches: main
    paths:
      - '.github/workflows/cmake-linux.yml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'include/**'
      - 'src/*pp'
      - 'src/linux/*pp'

jobs:
  build:
    name: ${{ matrix.compiler }}-${{ matrix.version }}
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ matrix.compiler }}-${{ matrix.version }}
      cancel-in-progress: true
    strategy:
      matrix:
        include:
          - compiler: clang
            version: 19
          - compiler: clang
            version: 20
          - compiler: clang
            version: 21
          - compiler: gcc
            version: 14
    steps:
      - uses: actions/checkout@v6

      - name: Install clang ${{ matrix.version }}
        if: ${{ matrix.compiler == 'clang' }}
        run: wget -qO - https://apt.llvm.org/llvm.sh | sudo bash -s -- ${{ matrix.version }} all

      - name: Configure
        run: |
          if [[ "${{ matrix.compiler }}" == "clang" ]]; then
            export CC=clang-${{ matrix.version }}
            export CXX=clang++-${{ matrix.version }}
            export CXXFLAGS="-stdlib=libc++"
            export LDFLAGS="-fuse-ld=lld -rtlib=compiler-rt -unwindlib=libunwind"
          else
            export CC=gcc-${{ matrix.version }}
            export CXX=g++-${{ matrix.version }}
          fi
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Compile
        run: cmake --build build --verbose

      - name: Test
        run: ctest --test-dir build

  sanitizer:
    name: sanitizer-${{ matrix.name }}
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-sanitizer-${{ matrix.name }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            sanitizer: "address,undefined"
          - name: tsan
            sanitizer: "thread"
    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 19
        run: wget -qO - https://apt.llvm.org/llvm.sh | sudo bash -s -- 19 all

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld-19 -rtlib=compiler-rt -unwindlib=libunwind" \
            -DBTOP_SANITIZER="${{ matrix.sanitizer }}" \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        env:
          ASAN_OPTIONS: ${{ matrix.name == 'asan-ubsan' && 'detect_leaks=1:halt_on_error=1' || '' }}
          UBSAN_OPTIONS: ${{ matrix.name == 'asan-ubsan' && 'halt_on_error=1:print_stacktrace=1' || '' }}
          TSAN_OPTIONS: ${{ matrix.name == 'tsan' && 'halt_on_error=1:second_deadlock_stack=1' || '' }}
        run: ctest --test-dir build --output-on-failure

      - name: Run benchmark workload under sanitizer
        env:
          ASAN_OPTIONS: ${{ matrix.name == 'asan-ubsan' && 'detect_leaks=1:halt_on_error=1' || '' }}
          UBSAN_OPTIONS: ${{ matrix.name == 'asan-ubsan' && 'halt_on_error=1:print_stacktrace=1' || '' }}
          TSAN_OPTIONS: ${{ matrix.name == 'tsan' && 'halt_on_error=1:second_deadlock_stack=1' || '' }}
        run: ./build/btop --benchmark 10
